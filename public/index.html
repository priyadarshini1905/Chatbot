<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Madurai Smart Assistant — Your AI-powered guide to Madurai, Tamil Nadu. Get information about temples, food, hotels, weather, events, and more.">
  <title>Madurai Smart Assistant 🛕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Chat History Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>💬 Chat History</h2>
      <button class="sidebar-close" id="sidebarClose">&times;</button>
    </div>
    <button class="new-chat-btn" id="newChatBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      New Chat
    </button>
    <div class="sidebar-conversations" id="conversationList">
      <!-- Dynamically populated -->
    </div>
  </aside>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="logo-section">
          <button class="hamburger-btn" id="hamburgerBtn" title="Chat history">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div class="logo-icon">🛕</div>
          <div class="logo-text">
            <h1>Madurai Smart Assistant</h1>
            <p class="tagline">Your AI Guide to the Temple City</p>
          </div>
        </div>
        <div class="header-actions">
          <div class="mode-selector" id="modeSelector">
            <button class="mode-btn" data-mode="kid" title="Kid Mode — Simple & Fun">👦 Kid</button>
            <button class="mode-btn active" data-mode="normal" title="Normal Mode — Balanced">👤 Normal</button>
            <button class="mode-btn" data-mode="elder" title="Elder Mode — Respectful & Detailed">🙏 Elder</button>
          </div>
          <div class="status-indicator">
            <span class="status-dot"></span>
            <span class="status-text">Online</span>
          </div>
          <button class="clear-btn" id="clearBtn" title="Clear chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Chat Area -->
    <main class="chat-area" id="chatArea">
      <!-- Welcome Message -->
      <div class="welcome-card" id="welcomeCard">
        <div class="welcome-icon">🛕</div>
        <h2>Vanakkam! 🙏</h2>
        <p>Welcome to your AI-powered guide for <strong>Madurai, Tamil Nadu</strong>. Ask me anything about:</p>
        <div class="topic-pills">
          <button class="topic-pill" data-query="Tell me about Meenakshi Amman Temple">🛕 Temples</button>
          <button class="topic-pill" data-query="What are the best food spots in Madurai?">🍛 Food</button>
          <button class="topic-pill" data-query="Suggest a 2-day itinerary for Madurai">📍 Tourist Places</button>
          <button class="topic-pill" data-query="What's the weather like in Madurai?">🌤️ Weather</button>
          <button class="topic-pill" data-query="Tell me about hotels near Meenakshi Temple">🏨 Hotels</button>
          <button class="topic-pill" data-query="What festivals happen in Madurai?">🎉 Events</button>
          <button class="topic-pill" data-query="How to reach Madurai from Chennai?">✈️ Travel</button>
          <button class="topic-pill" data-query="How is the traffic in Madurai city center?">🚗 Traffic</button>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages" id="messages"></div>
    </main>

    <!-- Input Area -->
    <footer class="input-area">
      <!-- Image Preview -->
      <div class="image-preview" id="imagePreview" style="display: none;">
        <img id="previewImg" src="" alt="Preview">
        <button class="preview-close" id="previewClose" title="Remove image">&times;</button>
      </div>
      <div class="input-container">
        <!-- Hidden file input -->
        <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp,image/gif" hidden>
        <button class="voice-btn upload-btn" id="uploadBtn" title="Upload an image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
            </path>
          </svg>
        </button>
        <input type="text" id="messageInput" class="message-input"
          placeholder="Ask about Madurai... temples, food, weather, hotels..." autocomplete="off" maxlength="1000">
        <button class="voice-btn" id="micBtn" title="Speak your question">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
        <button class="voice-btn speaker-btn" id="speakerBtn" title="Toggle voice responses">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </button>
        <button class="send-btn" id="sendBtn" title="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="voice-status" id="voiceStatus"></div>
      <p class="input-hint">Powered by AI • 📎 Upload image • 🎤 Speak • 🔊 Voice responses</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>

</html>
